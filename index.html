<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>নামাজ ট্র্যাকার</title>

<meta name="theme-color" content="#0f766e">

<link rel="manifest" id="manifest">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f4f4f4;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: #0f766e;
  color: white;
  cursor: pointer;
}

button:disabled {
  background: gray;
  cursor: not-allowed;
}

#installBtn {
  display: none;
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: black;
  color: white;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<div class="container">
  <h1>🕌 নামাজ ট্র্যাকার</h1>

  <button id="installBtn">Install App</button>

  <h2>মোট কয়েন: <span id="coins">0</span></h2>

  <div id="list"></div>
</div>

<script type="module">
import { openDB } from "https://unpkg.com/idb?module";

const prayers = ["ফজর", "যোহর", "আসর", "মাগরিব", "ইশা"];

/* =========================
   DATABASE (IndexedDB)
========================= */
const db = await openDB("prayerDB", 1, {
  upgrade(db) {
    db.createObjectStore("store");
  }
});

const get = (k) => db.get("store", k);
const set = (k,v) => db.put("store", v, k);

/* =========================
   INIT DATA
========================= */
let coins = await get("coins");
if (coins === undefined) {
  coins = 0;
  await set("coins", coins);
}

let completed = await get("completed");
if (!completed) {
  completed = {};
  await set("completed", completed);
}

const coinsEl = document.getElementById("coins");
coinsEl.textContent = coins;

/* =========================
   UI RENDER
========================= */
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  prayers.forEach(p => {
    const done = completed[p];

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <span>${p}</span>
      <button ${done ? "disabled" : ""}>
        ${done ? "সম্পন্ন" : "পড়েছি"}
      </button>
    `;

    card.querySelector("button").onclick = async () => {
      if (completed[p]) return;

      completed[p] = true;
      coins += 10;

      await set("completed", completed);
      await set("coins", coins);

      coinsEl.textContent = coins;

      render();
    };

    list.appendChild(card);
  });
}

render();

/* =========================
   SERVICE WORKER (OFFLINE)
========================= */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register(
    URL.createObjectURL(new Blob([`
      const CACHE = "prayer-pwa-v1";

      self.addEventListener("install", e => {
        e.waitUntil(
          caches.open(CACHE).then(cache =>
            cache.addAll(["./"])
          )
        );
      });

      self.addEventListener("fetch", e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request))
        );
      });
    `], { type: "text/javascript" }))
  );
}

/* =========================
   INSTALL BUTTON
========================= */
let deferredPrompt;
const installBtn = document.getElementById("installBtn");

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.addEventListener("click", async () => {
  deferredPrompt.prompt();
  const choice = await deferredPrompt.userChoice;

  if (choice.outcome === "accepted") {
    installBtn.style.display = "none";
  }

  deferredPrompt = null;
});

/* =========================
   MANIFEST (ICON "S")
========================= */
const manifest = {
  name: "নামাজ ট্র্যাকার",
  short_name: "নামাজ",
  start_url: ".",
  display: "standalone",
  background_color: "#ffffff",
  theme_color: "#0f766e",
  icons: [
    {
      src: "data:image/svg+xml," + encodeURIComponent(`
        <svg xmlns='http://www.w3.org/2000/svg' width='512' height='512'>
          <rect width='100%' height='100%' fill='#0f766e'/>
          <text x='50%' y='55%' font-size='300'
            text-anchor='middle'
            fill='white'
            font-family='Arial'>S</text>
        </svg>
      `),
      sizes: "512x512",
      type: "image/png"
    }
  ]
};

document.getElementById("manifest").href =
  URL.createObjectURL(new Blob([JSON.stringify(manifest)], {
    type: "application/json"
  }));

/* =========================
   PERSIST STORAGE
========================= */
if (navigator.storage?.persist) {
  navigator.storage.persist();
}
</script>

</body>
</html>
